<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemio ERP 自然語言查詢</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { background: #f4f6f9; }
    .hero {
      background: linear-gradient(135deg, #1a3c6e 0%, #2563eb 100%);
      color: white;
      padding: 1.5rem 2rem;
      border-radius: 0 0 1rem 1rem;
      box-shadow: 0 4px 16px rgba(37,99,235,.25);
    }
    .hero h1 { font-size: 1.6rem; font-weight: 700; margin: 0; }
    .hero p { margin: 0; opacity: .85; font-size: .95rem; }
    .card { border: none; box-shadow: 0 2px 10px rgba(0,0,0,.08); border-radius: .75rem; }
    .card-header { border-radius: .75rem .75rem 0 0 !important; font-weight: 600; }
    #result-area { min-height: 80px; }
    .table-name-badge {
      cursor: pointer;
      font-size: .78rem;
      padding: .25em .6em;
      margin: .15rem;
      display: inline-block;
    }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }
    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.65);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #loading-overlay.show { display: flex; }
    .spinner-wrap { text-align: center; }
  </style>
</head>
<body>

<!-- 1. 抬頭 -->
<div class="hero mb-4">
  <div class="container-fluid">
    <div class="d-flex align-items-center gap-3">
      <i class="bi bi-database-gear fs-2"></i>
      <div>
        <h1>Gemio ERP 自然語言查詢</h1>
        <p>以中文描述您的需求，系統自動產生 SQL 並查詢資料庫</p>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid px-4">
  <div class="row g-4">

    <!-- 左欄：輸入 + 結果 + SQL -->
    <div class="col-lg-9">

      <!-- 2. 輸入框 -->
      <div class="card mb-4">
        <div class="card-header bg-primary text-white">
          <i class="bi bi-chat-left-text me-2"></i>自然語言輸入
        </div>
        <div class="card-body">
          <form
            hx-post="/query"
            hx-target="#result-area"
            hx-swap="innerHTML"
            hx-indicator="#loading-overlay"
            onsubmit="showLoading()"
          >
            <div class="input-group input-group-lg">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input
                type="text"
                name="question"
                id="question-input"
                class="form-control"
                placeholder="例如：顯示所有採購單中未交量大於0的品項"
                required
                autocomplete="off"
              />
              <button class="btn btn-primary px-4" type="submit">
                <i class="bi bi-play-fill me-1"></i>查詢
              </button>
            </div>
            <div class="form-text mt-2">
              <i class="bi bi-lightbulb text-warning"></i>
              提示：可點選右側表格名稱快速了解可查詢的資料範圍
            </div>
          </form>
        </div>
      </div>

      <!-- 3 & 4. 查詢結果 + SQL（動態載入） -->
      <div id="result-area">
        <div class="card">
          <div class="card-body text-center text-muted py-5">
            <i class="bi bi-inbox fs-1 d-block mb-2 opacity-50"></i>
            請輸入問題並按下查詢
          </div>
        </div>
      </div>

    </div>

    <!-- 右欄：可查詢的表 -->
    <div class="col-lg-3">
      <div class="card" style="position: sticky; top: 1rem; max-height: 85vh; overflow-y: auto;">
        <div class="card-header bg-secondary text-white">
          <i class="bi bi-table me-2"></i>可查詢的表 ({{ tables | length }})
        </div>
        <div class="card-body p-2">
          {% for t in tables %}
          <span
            class="badge bg-light text-dark border table-name-badge"
            onclick="document.getElementById('question-input').value = '查詢 {{ t }} 的資料'; document.getElementById('question-input').focus();"
            title="{{ t }}"
          >{{ t }}</span>
          {% endfor %}
          {% if not tables %}
          <p class="text-muted small mb-0">無法載入資料表清單，請確認資料庫連線</p>
          {% endif %}
        </div>
        <div class="card-footer text-muted" style="font-size:.75rem;">
          點擊表名可填入範例查詢
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 載入提示 overlay -->
<div id="loading-overlay">
  <div class="spinner-wrap bg-white rounded-4 shadow p-5">
    <div class="spinner-border text-primary" style="width:3.5rem;height:3.5rem;" role="status"></div>
    <p class="mt-3 fw-semibold text-primary fs-5 mb-1">系統查詢中</p>
    <p class="text-muted small">正在將您的問題轉換為 SQL 並查詢資料庫，請稍候…</p>
  </div>
</div>

<script>
function showLoading() {
  document.getElementById('loading-overlay').classList.add('show');
}
document.body.addEventListener('htmx:afterSwap', function() {
  document.getElementById('loading-overlay').classList.remove('show');
});
document.body.addEventListener('htmx:responseError', function() {
  document.getElementById('loading-overlay').classList.remove('show');
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
